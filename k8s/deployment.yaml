apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcast-api
  namespace: production
  labels:
    app: nextcast-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nextcast-api
  template:
    metadata:
      labels:
        app: nextcast-api
    spec:
      containers:
        - name: nextcast-api
          image: ghcr.io/example/nextcast-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: APP_ENV
              value: production
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
