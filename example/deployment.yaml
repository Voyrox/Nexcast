apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcast-example
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nextcast-example
  template:
    metadata:
      labels:
        app: nextcast-example
    spec:
      containers:
        - name: example-server
          image: example-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: SHUTDOWN_GRACE_PERIOD
              value: "10s"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
