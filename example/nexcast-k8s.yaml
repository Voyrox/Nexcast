apiVersion: v1
kind: ServiceAccount
metadata:
  name: nextcast
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nextcast
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nextcast
subjects:
  - kind: ServiceAccount
    name: nextcast
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nextcast
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nextcast-services
data:
  services.yaml: |
    services:
      - name: api
        system_id: 0
        namespace: default
        deployment_name: nextcast-example
        min_replicas: 1
        max_replicas: 10
        target_per_node: 65.0
        scale_up_step: 2
        scale_down_step: 1
---
apiVersion: v1
kind: Service
metadata:
  name: nextcast
spec:
  selector:
    app: nextcast
  ports:
    - name: http
      port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcast
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nextcast
  template:
    metadata:
      labels:
        app: nextcast
    spec:
      serviceAccountName: nextcast
      containers:
        - name: nextcast
          image: nexcast:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: BACKEND
              value: kubernetes
            - name: LISTEN_ADDR
              value: ":8081"
            - name: SERVICES_FILE
              value: /etc/nexcast/services.yaml
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: METRICS_FALLBACK_POLICY
              value: scale-up-only
            - name: CHECK_INTERVAL
              value: 20s
            - name: COOLDOWN
              value: 60s
          ports:
            - containerPort: 8081
              name: http
          volumeMounts:
            - name: services
              mountPath: /etc/nexcast
      volumes:
        - name: services
          configMap:
            name: nextcast-services
