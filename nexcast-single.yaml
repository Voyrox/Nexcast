apiVersion: v1
kind: ServiceAccount
metadata:
  name: nexcast
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nexcast
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nexcast
  namespace: default
subjects:
  - kind: ServiceAccount
    name: nexcast
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nexcast
---
apiVersion: v1
kind: Service
metadata:
  name: nexcast
  namespace: default
spec:
  selector:
    app: nexcast
  ports:
    - name: http
      port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexcast
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexcast
  template:
    metadata:
      labels:
        app: nexcast
    spec:
      serviceAccountName: nexcast
      containers:
        - name: nexcast
          image: glitchedking/netcast:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8081
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: BACKEND
              value: kubernetes-peer
            - name: SELF_ADDR
              value: nexcast.default.svc.cluster.local:8081
            - name: PUPPETS
              value: nexcast.default.svc.cluster.local:8081
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CHECK_INTERVAL
              value: 20s
            - name: COOLDOWN
              value: 60s
