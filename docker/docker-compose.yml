version: "3.9"

services:
  nextcast-api:
    image: ghcr.io/example/nextcast-api:latest
    container_name: nextcast-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_ENV: production
      PORT: "8080"
      LOG_LEVEL: info
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M

  prometheus:
    image: prom/prometheus:latest
    container_name: nextcast-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
